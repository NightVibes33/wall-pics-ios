name: App Store Products

on:
  workflow_dispatch:

jobs:
  create-products:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create missing App Store products
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRISM_APP_BUNDLE_ID: com.nightvibes.prism.39A8Q3T3TR
        run: ruby tool/app_store_connect_create_products.rb

      - name: Inspect App Store products
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRISM_APP_BUNDLE_ID: com.nightvibes.prism.39A8Q3T3TR
        run: ruby tool/app_store_connect_products.rb
