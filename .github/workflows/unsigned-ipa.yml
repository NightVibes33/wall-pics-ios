name: Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          if ls /Applications/Xcode_26*.app >/dev/null 2>&1; then
            latest_xcode="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"
            sudo xcode-select -s "$latest_xcode/Contents/Developer"
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Read Flutter version
        id: flutter_version
        run: |
          FLUTTER_VERSION="$(python3 -c 'import json; print(json.load(open(".fvmrc"))["flutter"])')"
          echo "version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true

      - name: Write optional app env
        env:
          PRISM_ENV: ${{ secrets.PRISM_ENV }}
          CATALOG_BASE_URL: ${{ secrets.PRISM_CATALOG_BASE_URL || secrets.WALL_PICS_CATALOG_BASE_URL || vars.PRISM_CATALOG_BASE_URL }}
          USER_STORE_API_BASE_URL: ${{ secrets.USER_STORE_API_BASE_URL || vars.USER_STORE_API_BASE_URL }}
          MEDIA_BASE_URL: ${{ secrets.PRISM_MEDIA_BASE_URL || vars.PRISM_MEDIA_BASE_URL }}
        run: sh tool/write_prism_env.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Refresh iOS pod lock
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build unsigned device app
        run: |
          DART_DEFINES="$(./tool/dart_defines_from_env.sh)"
          DART_DEFINES="$DART_DEFINES --dart-define=SIDELOAD_BUILD=true --dart-define=LOCAL_PERSISTENCE_BACKEND=memory"
          SIDELOAD_BUILD_NUMBER="$((3000 + GITHUB_RUN_NUMBER))"
          echo "Building SideStore-safe unsigned app build $SIDELOAD_BUILD_NUMBER"
          flutter build ios --release --no-codesign --no-pub --build-number="$SIDELOAD_BUILD_NUMBER" $DART_DEFINES

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "No unsigned Runner.app found"
            find build/ios -maxdepth 4 -print || true
            exit 1
          fi

          BUILD_NUMBER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist")"
          echo "Packaged app build number: $BUILD_NUMBER"
          if [ "$BUILD_NUMBER" -le 332 ]; then
            echo "SideStore build number did not increase: $BUILD_NUMBER"
            exit 1
          fi

          DISPLAY_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$APP_PATH/Info.plist")"
          if [ "$DISPLAY_NAME" != "Přism" ]; then
            echo "Unexpected display name: $DISPLAY_NAME"
            exit 1
          fi

          SECRET_FILES="$(find "$APP_PATH" \( -name 'AuthKey_*.p8' -o -name 'embedded.mobileprovision' \) -print)"
          if [ -n "$SECRET_FILES" ]; then
            echo "Unexpected signing/TestFlight material in sideload app:"
            echo "$SECRET_FILES"
            exit 1
          fi

          if [ -d "$APP_PATH/Frameworks" ]; then
            while IFS= read -r -d '' binary; do
              codesign --force --sign - --timestamp=none "$binary"
            done < <(find "$APP_PATH/Frameworks" -type f -name '*.dylib' -print0)
            while IFS= read -r -d '' framework; do
              codesign --force --sign - --timestamp=none "$framework"
            done < <(find "$APP_PATH/Frameworks" -maxdepth 1 -type d -name '*.framework' -print0)
          fi
          codesign --force --sign - --timestamp=none "$APP_PATH"

          echo "Embedded framework count:"
          find "$APP_PATH/Frameworks" -maxdepth 1 -name '*.framework' -print 2>/dev/null | wc -l
          echo "Framework signature count:"
          find "$APP_PATH/Frameworks" -maxdepth 2 -name '_CodeSignature' -print 2>/dev/null | wc -l

          rm -rf build/unsigned build/Prism-unsigned.ipa
          mkdir -p build/unsigned/Payload
          cp -R "$APP_PATH" build/unsigned/Payload/
          cp assets/icon/ios.png build/Prism-icon.png
          cd build/unsigned
          /usr/bin/zip -qry ../Prism-unsigned.ipa Payload
          cd ../..
          ls -lh build/Prism-unsigned.ipa build/Prism-icon.png
          shasum -a 256 build/Prism-unsigned.ipa | tee build/Prism-unsigned.ipa.sha256

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prism-unsigned-ipa-${{ github.run_number }}
          path: |
            build/Prism-unsigned.ipa
            build/Prism-icon.png
            build/Prism-unsigned.ipa.sha256
          retention-days: 30
          if-no-files-found: error
