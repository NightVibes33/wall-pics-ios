name: mo1 App Store Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Create App Store records and copy mo1 secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate source secrets
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MO1_SECRET_ADMIN_TOKEN: ${{ secrets.MO1_SECRET_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APP_STORE_CONNECT_API_KEY_P8 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APPLE_TEAM_ID \
            MO1_SECRET_ADMIN_TOKEN
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Create/check App Store Connect records
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DOPI_BUNDLE_ID: app.mo1.player
          DOPI_APP_NAME: dopI
          DOPI_SKU: DOPI-APP-MO1-PLAYER
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import tempfile
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          API = "https://api.appstoreconnect.apple.com/v1"
          KEY_ID = os.environ["APP_STORE_CONNECT_KEY_ID"]
          ISSUER_ID = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          PRIVATE_KEY = os.environ["APP_STORE_CONNECT_API_KEY_P8"]
          BUNDLE_ID = os.environ["DOPI_BUNDLE_ID"]
          APP_NAME = os.environ["DOPI_APP_NAME"]
          SKU = os.environ["DOPI_SKU"]

          def b64url(data: bytes) -> str:
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

          def der_to_raw(sig: bytes) -> bytes:
              if not sig or sig[0] != 0x30:
                  raise ValueError("signature is not DER")
              idx = 1
              length = sig[idx]
              idx += 1
              if length & 0x80:
                  idx += length & 0x7F
              out = []
              for _ in range(2):
                  if sig[idx] != 0x02:
                      raise ValueError("missing ECDSA integer")
                  idx += 1
                  length = sig[idx]
                  idx += 1
                  value = sig[idx:idx + length]
                  idx += length
                  while value and value[0] == 0:
                      value = value[1:]
                  out.append(value.rjust(32, b"\0"))
              return out[0] + out[1]

          def token() -> str:
              now = int(time.time())
              header = {"alg": "ES256", "kid": KEY_ID, "typ": "JWT"}
              payload = {"iss": ISSUER_ID, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
              signing_input = (
                  b64url(json.dumps(header, separators=(",", ":")).encode())
                  + "."
                  + b64url(json.dumps(payload, separators=(",", ":")).encode())
              ).encode()
              with tempfile.NamedTemporaryFile(mode="w", delete=False) as key_file:
                  key_file.write(PRIVATE_KEY)
                  key_path = key_file.name
              try:
                  result = subprocess.run(
                      ["openssl", "dgst", "-sha256", "-sign", key_path],
                      input=signing_input,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      check=False,
                  )
              finally:
                  try:
                      os.unlink(key_path)
                  except OSError:
                      pass
              if result.returncode:
                  raise RuntimeError(result.stderr.decode())
              return signing_input.decode() + "." + b64url(der_to_raw(result.stdout))

          def request(method: str, path: str, body=None):
              data = None
              headers = {"Authorization": "Bearer " + token(), "Accept": "application/json"}
              if body is not None:
                  data = json.dumps(body).encode()
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(API + path, data=data, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      raw = response.read()
                      return json.loads(raw.decode() or "{}")
              except urllib.error.HTTPError as error:
                  raw = error.read().decode("utf-8", "ignore")
                  raise RuntimeError(f"{method} {path} failed with {error.code}: {raw[:1000]}")

          def first(data):
              values = data.get("data", [])
              return values[0] if values else None

          encoded_bundle = urllib.parse.quote(BUNDLE_ID, safe="")
          bundle = first(request("GET", f"/bundleIds?filter[identifier]={encoded_bundle}&limit=1"))
          if bundle:
              bundle_resource_id = bundle["id"]
              print(f"Bundle ID already exists for {BUNDLE_ID}")
          else:
              body = {
                  "data": {
                      "type": "bundleIds",
                      "attributes": {
                          "identifier": BUNDLE_ID,
                          "name": APP_NAME,
                          "platform": "IOS",
                      },
                  }
              }
              bundle = request("POST", "/bundleIds", body)["data"]
              bundle_resource_id = bundle["id"]
              print(f"Created Bundle ID for {BUNDLE_ID}")

          try:
              caps = request("GET", f"/bundleIds/{bundle_resource_id}/bundleIdCapabilities?limit=200")
              has_music = any(item.get("attributes", {}).get("capabilityType") == "MUSIC_KIT" for item in caps.get("data", []))
              if has_music:
                  print("MusicKit capability already enabled")
              else:
                  body = {
                      "data": {
                          "type": "bundleIdCapabilities",
                          "attributes": {"capabilityType": "MUSIC_KIT", "settings": []},
                          "relationships": {
                              "bundleId": {"data": {"type": "bundleIds", "id": bundle_resource_id}}
                          },
                      }
                  }
                  request("POST", "/bundleIdCapabilities", body)
                  print("Enabled MusicKit capability")
          except Exception as error:
              print(f"::warning::MusicKit capability setup did not complete: {error}")

          app = first(request("GET", f"/apps?filter[bundleId]={encoded_bundle}&limit=1"))
          if app:
              print(f"App Store Connect app already exists for {BUNDLE_ID}")
          else:
              body = {
                  "data": {
                      "type": "apps",
                      "attributes": {
                          "bundleId": BUNDLE_ID,
                          "name": APP_NAME,
                          "primaryLocale": "en-US",
                          "sku": SKU,
                          "platform": "IOS",
                      },
                  }
              }
              request("POST", "/apps", body)
              print(f"Created App Store Connect app {APP_NAME}")
          PY

      - name: Copy TestFlight secrets to mo1
        env:
          GH_TOKEN: ${{ secrets.MO1_SECRET_ADMIN_TOKEN }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" | gh secret set APP_STORE_CONNECT_API_KEY_P8 -R NightVibes33/mo1
          printf '%s' "$APP_STORE_CONNECT_KEY_ID" | gh secret set APP_STORE_CONNECT_KEY_ID -R NightVibes33/mo1
          printf '%s' "$APP_STORE_CONNECT_ISSUER_ID" | gh secret set APP_STORE_CONNECT_ISSUER_ID -R NightVibes33/mo1
          printf '%s' "$APPLE_TEAM_ID" | gh secret set APPLE_TEAM_ID -R NightVibes33/mo1
          printf '%s' "app.mo1.player" | gh secret set APP_BUNDLE_ID -R NightVibes33/mo1
          echo "Copied App Store Connect/TestFlight secrets into NightVibes33/mo1"
