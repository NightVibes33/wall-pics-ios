name: TestFlight

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if ls /Applications/Xcode_26*.app >/dev/null 2>&1; then
            latest_xcode="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"
            sudo xcode-select -s "$latest_xcode/Contents/Developer"
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Read Flutter version
        id: flutter_version
        run: |
          FLUTTER_VERSION="$(python3 -c 'import json; print(json.load(open(".fvmrc"))["flutter"])')"
          echo "version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true

      - name: Prepare production env file
        env:
          PRISM_ENV: ${{ secrets.PRISM_ENV }}
          CATALOG_BASE_URL: ${{ secrets.PRISM_CATALOG_BASE_URL || secrets.WALL_PICS_CATALOG_BASE_URL || vars.PRISM_CATALOG_BASE_URL }}
          USER_STORE_API_BASE_URL: ${{ secrets.USER_STORE_API_BASE_URL || vars.USER_STORE_API_BASE_URL }}
          MEDIA_BASE_URL: ${{ secrets.PRISM_MEDIA_BASE_URL || vars.PRISM_MEDIA_BASE_URL }}
          PRISM_SCRAPER_API_BASE_URL: ${{ secrets.PRISM_SCRAPER_API_BASE_URL || vars.PRISM_SCRAPER_API_BASE_URL }}
          WALLPICS_API_BASE_URL: ${{ secrets.WALLPICS_API_BASE_URL || vars.WALLPICS_API_BASE_URL }}
          WALLPICS_AUTH_HEADER: ${{ secrets.WALLPICS_AUTH_HEADER }}
          WALLPICS_BEARER_TOKEN: ${{ secrets.WALLPICS_BEARER_TOKEN }}
          WALLPICS_X_TOKEN: ${{ secrets.WALLPICS_X_TOKEN }}
          WALLPICS_X_AUTH: ${{ secrets.WALLPICS_X_AUTH }}
          WALLPICS_HHAA: ${{ secrets.WALLPICS_HHAA }}
          WALLPICS_EXTRA_HEADERS_JSON: ${{ secrets.WALLPICS_EXTRA_HEADERS_JSON }}
        run: sh tool/write_prism_env.sh

      - name: Generate encrypted bundled catalog media
        env:
          PRISM_SEED_MEDIA_LAYOUT: files
          PRISM_SEED_MEDIA_LIMIT: 20000
          PRISM_SEED_MEDIA_MAX_BYTES: 1800000000
          PRISM_SEED_MEDIA_PER_FILE_MAX_BYTES: 180000000
          PRISM_SEED_MEDIA_API_MAX_PAGES: 500
          PRISM_SEED_MEDIA_CATALOG_MAX_PAGES: 500
          PRISM_SEED_MEDIA_PAGE_SIZE: 100
          PRISM_SEED_MEDIA_DOWNLOAD_WORKERS: 16
          PRISM_SEED_MEDIA_TILE_WIDTH: 480
          PRISM_SEED_MEDIA_TILE_QUALITY: 72
          PRISM_SEED_MEDIA_RECOMPRESS_IMAGES: true
          PRISM_SEED_MEDIA_RECOMPRESS_WIDTH: 480
          PRISM_SEED_MEDIA_RECOMPRESS_QUALITY: 72
          PRISM_SEED_MEDIA_INCLUDE_FULL_IMAGES: false
          PRISM_SEED_MEDIA_INCLUDE_VIDEO: false
          PRISM_SEED_MEDIA_INCLUDE_ARCHIVE: false
          PRISM_BUNDLE_CATALOG_MAX_PAGES: 500
        run: |
          if [ -f assets/catalog/prism_index.json ]; then
            echo "Using committed Prism catalog JSON assets"
          else
            python3 tool/sync_prism_catalog_assets.py
          fi
          python3 tool/generate_prism_seed_media.py

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document


      - name: Refresh iOS pod lock
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build Flutter iOS artifacts without codesigning
        run: |
          DART_DEFINES="$(./tool/dart_defines_from_env.sh)"
          TESTFLIGHT_BUILD_NUMBER="$((5000 + GITHUB_RUN_NUMBER))"
          echo "Building TestFlight app build $TESTFLIGHT_BUILD_NUMBER"
          flutter build ios --release --no-codesign --build-number="$TESTFLIGHT_BUILD_NUMBER" $DART_DEFINES

      - name: Write App Store Connect key
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p private_keys
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$PWD/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"

      - name: Archive unsigned app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Prism.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$((5000 + GITHUB_RUN_NUMBER))" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p build/export
          cp ExportOptions.plist build/ExportOptions.generated.plist
          /usr/libexec/PlistBuddy -c "Set :manageAppVersionAndBuildNumber false" build/ExportOptions.generated.plist
          /usr/libexec/PlistBuddy -c "Delete :teamID" build/ExportOptions.generated.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" build/ExportOptions.generated.plist
          xcodebuild \
            -exportArchive \
            -archivePath build/Prism.xcarchive \
            -exportOptionsPlist build/ExportOptions.generated.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            find build/export -maxdepth 2 -type f -print
            exit 1
          fi
          shasum -a 256 "$IPA_PATH" | tee build/export/ipa.sha256

      - name: Upload TestFlight IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prism-testflight-ipa-${{ github.run_number }}
          path: |
            build/export/*.ipa
            build/export/ipa.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH="$(find build/export -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/export"
            find build/export -maxdepth 2 -type f -print
            exit 1
          fi
          xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$APP_STORE_CONNECT_KEY_ID" --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
