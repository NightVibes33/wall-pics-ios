name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r '.flutter' .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ steps.fvm.outputs.version }}
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Install dependencies
        run: make get CI=true

      - name: Check formatting
        run: make format-check CI=true

      - name: Env define guard
        run: make env-guard

      - name: Version sync guard
        run: make version-guard

      - name: Analyze
        run: make analyze CI=true

      - name: Run tests
        run: make test CI=true
