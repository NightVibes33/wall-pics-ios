name: TestFlight Public Link

on:
  workflow_dispatch:

jobs:
  public-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or print public TestFlight link
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRISM_APP_BUNDLE_ID: com.nightvibes.prism.39A8Q3T3TR
          PRISM_BETA_GROUP_NAME: Přism Public Beta
        run: ruby tool/app_store_connect_public_link.rb
