name: iOS Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          if ls /Applications/Xcode_26*.app >/dev/null 2>&1; then
            latest_xcode="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"
            sudo xcode-select -s "$latest_xcode/Contents/Developer"
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Read Flutter version
        id: flutter_version
        run: |
          FLUTTER_VERSION="$(python3 -c 'import json; print(json.load(open(".fvmrc"))["flutter"])')"
          echo "version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Remove Firebase from sideload iOS native plugins
        run: python3 tool/strip_ios_firebase_registrant.py ios/Runner/GeneratedPluginRegistrant.m

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Prepare sideload compile stubs
        run: |
          cat > lib/firebase_options.dart <<'DART'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
              apiKey: 'AIzaSyDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDDD',
              appId: '1:000000000000:ios:0000000000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'wall-pics-stub',
              iosBundleId: 'com.nightvibes.prism',
            );
          }
          DART
          rm -f ios/Runner/GoogleService-Info.plist


      - name: Refresh iOS pod lock
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Build iOS app without codesigning
        run: |
          DART_DEFINES="$(./tool/dart_defines_from_env.sh)"
          DART_DEFINES="$DART_DEFINES --dart-define=SKIP_FIREBASE_INIT=true --dart-define=SIDELOAD_BUILD=true"
          flutter build ios --release --no-codesign --no-pub $DART_DEFINES

      - name: Verify Wall Pics app bundle
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          test -d "$APP_PATH"
          DISPLAY_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$APP_PATH/Info.plist")"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          if [ "$DISPLAY_NAME" != "Wall Pics" ]; then
            echo "Unexpected display name: $DISPLAY_NAME"
            exit 1
          fi
          if [ "$BUNDLE_ID" != "com.nightvibes.prism" ]; then
            echo "Unexpected bundle id: $BUNDLE_ID"
            exit 1
          fi
          if [ -d "$APP_PATH/Frameworks" ]; then
            FIREBASE_FRAMEWORKS="$(find "$APP_PATH/Frameworks" -maxdepth 1 \( -iname '*Firebase*' -o -iname 'cloud_firestore.framework' -o -iname 'cloud_functions.framework' -o -iname 'firebase_*.framework' \) -print)"
            if [ -n "$FIREBASE_FRAMEWORKS" ]; then
              echo "Unexpected Firebase frameworks in sideload app:"
              echo "$FIREBASE_FRAMEWORKS"
              exit 1
            fi
          fi
          SECRET_FILES="$(find "$APP_PATH" \( -name 'GoogleService-Info.plist' -o -name 'AuthKey_*.p8' -o -name 'embedded.mobileprovision' \) -print)"
          if [ -n "$SECRET_FILES" ]; then
            echo "Unexpected signing/TestFlight material in sideload app:"
            echo "$SECRET_FILES"
            exit 1
          fi
